databases:
  - name: ipl-auction-db
    plan: free
    databaseName: ipl_auction
    user: ipl_auction_user

services:
  - type: web
    name: ipl-auction
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ipl-auction-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
