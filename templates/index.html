<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction 2026 — Login</title>
    <meta name="description" content="Login to the IPL Cricket Auction">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="landing-page">
    <div class="bg-particles" id="particles"></div>

    <div class="landing-container">
        <header class="landing-header">
            <div class="logo-glow">
                <h1 class="logo-text">
                    <span class="logo-ipl">IPL</span>
                    <span class="logo-auction">AUCTION</span>
                    <span class="logo-year">2026</span>
                </h1>
            </div>
            <p class="tagline">Authentication Portal</p>
            {% if request.args.get('error') %}
            <div class="error-banner"
                style="background: rgba(255, 0,0,0.2); color: #ff5252; padding: 10px; border-radius: 8px; margin-top: 20px; text-align: center; border: 1px solid #ff5252;">
                {{ request.args.get('error') }}
            </div>
            {% endif %}
        </header>

        <div class="landing-cards">
            <!-- Auctioneer Login Card -->
            <div class="action-card admin-card">
                <div class="card-icon">🎙️</div>
                <h2>Auctioneer</h2>
                <p>Login to manage auction rooms and control the bidding flow</p>
                <form id="auctioneerForm" class="join-form">
                    <input type="password" id="auctioneerPassword" placeholder="Admin Password" class="input-styled"
                        required>
                    <button type="submit" class="btn btn-primary btn-glow" id="auctioneerLoginBtn">
                        Login as Admin
                        <span class="btn-shine"></span>
                    </button>
                    <p class="error-text" id="auctioneerError"
                        style="color: #ff5252; font-size: 0.9rem; margin-top: 10px; display: none;"></p>
                </form>
            </div>

            <!-- Team Login Card -->
            <div class="action-card team-card">
                <div class="card-icon">🏏</div>
                <h2>Team Owner</h2>
                <p>Login to join a room and bid on your dream squad</p>
                <form id="teamForm" class="join-form">
                    <input type="password" id="teamPassword" placeholder="Team Password" class="input-styled" required>
                    <button type="submit" class="btn btn-secondary btn-glow" id="teamLoginBtn">
                        Login as Team
                        <span class="btn-shine"></span>
                    </button>
                    <p class="error-text" id="teamError"
                        style="color: #ff5252; font-size: 0.9rem; margin-top: 10px; display: none;"></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = (6 + Math.random() * 8) + 's';
            particlesEl.appendChild(p);
        }

        async function handleLogin(e, role, passwordId, errorId, btnId) {
            e.preventDefault();
            const password = document.getElementById(passwordId).value;
            const errorEl = document.getElementById(errorId);
            const btn = document.getElementById(btnId);

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            errorEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, password })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorEl.textContent = data.message || 'Login failed';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = role === 'auctioneer' ? 'Login as Admin' : 'Login as Team';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = role === 'auctioneer' ? 'Login as Admin' : 'Login as Team';
            }
        }

        document.getElementById('auctioneerForm').addEventListener('submit', (e) => {
            handleLogin(e, 'auctioneer', 'auctioneerPassword', 'auctioneerError', 'auctioneerLoginBtn');
        });

        document.getElementById('teamForm').addEventListener('submit', (e) => {
            handleLogin(e, 'team', 'teamPassword', 'teamError', 'teamLoginBtn');
        });
    </script>
</body>

</html>
